<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 · 页面走丢了 | 蒲贺良</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: #17211f;
      background: #f6f5ef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    }
    .code {
      margin: 0;
      font-size: clamp(4rem, 18vw, 8rem);
      font-weight: 800;
      line-height: 1;
      color: #0f766e;
    }
    h1 { margin: 14px 0 6px; font-size: 1.3rem; }
    p { margin: 0 0 22px; color: #62706d; }
    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 10px 20px;
      border-radius: 8px;
      background: #17211f;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #e2e8f0; }
      .code { color: #5eead4; }
      p { color: #94a3b8; }
      a { background: #e2e8f0; color: #0f172a; }
    }
  </style>
</head>
<body>
  <main>
    <p class="code">404</p>
    <h1>页面走丢了</h1>
    <p>这个链接可能已失效或不存在。</p>
    <a href="/">返回首页</a>
  </main>
</body>
</html>
